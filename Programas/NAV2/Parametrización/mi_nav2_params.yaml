# ---------------------------------------------
# Este paquete es el encargado de la toma de desiciones, además coordina las tareas de navegación del robot a través de árboles de comportamiento. 
# Dos tipos principales de navegadores: "navigate_to_pose" para ir a un punto específico, y "navigate_through_poses" para seguir una secuencia de puntos.
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10 # ms - Con que frecuencia se toman las desiciones. 
    default_server_timeout: 20 # ms - Tiempo máximo para que los servidores de navegación respondan antes de considerar que han fallado.
    wait_for_service_timeout: 1000 # ms - Tiempo máximo para esperar a que los servicios de navegación estén disponibles antes de iniciar el proceso de navegación.
    action_server_result_timeout: 900.0 # s - Tiempo máximo para esperar a que el servidor de acciones de navegación devuelva un resultado antes de considerar que ha fallado.
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    transform_tolerance: 0.3
# ---------------------------------------------

# ---------------------------------------------
# Este paquete toma rutas planificadas por el planner_server y las convierte en comandos de velocidad para el robot.
controller_server:
  ros__parameters:
    controller_frequency: 10.0
    costmap_update_timeout: 1.5
    min_x_velocity_threshold: 0.10 
    min_y_velocity_threshold: 0.10 
    min_theta_velocity_threshold: 0.1
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05 
      movement_time_allowance: 20.0 
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10 
      yaw_goal_tolerance: 0.10 
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.1
      batch_size: 2000 
      lookahead_dist: 1.4
      ax_max: 1.8 # Valor por defecto 3.0 
      #ax_max: 2.0  # Aceleración en X (m/s^2)
      ax_min: -1.8
      #ax_min: -2.0  # Aceleración en X (m/s^2)|
      ay_max: 3.0
      #ay_max: 2.0  # Aceleración en Y (m/s^2)
      ay_min: -3.0
      #ay_min: -2.0  # Aceleración en Y (m/s^2)
      az_max: 3.5
      az_max: 2.5  # Aceleración angular (rad/s^2)
      vx_std: 0.2 
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.18 #0.35
      vx_min: -0.18
      vy_max: 0.32
      vy_min: -0.32
      wz_max: 0.25
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015  
      #motion_model: "DiffDrive"
      motion_model: "Omni"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "GoalCritic",
        "PathAlignCritic", "PathFollowCritic",
        "TwirlingCritic", "GoalAngleCritic", "PathAngleCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0 
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0 
        threshold_to_consider: 0.6
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0 
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.3
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 0.5
      PathAngleCritic:
       enabled: true
       cost_power: 1
       cost_weight: 1.5
       offset_from_furthest: 4
       threshold_to_consider: 1.0
       max_angle_to_furthest: 0.5
       mode: 0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 20.0 # Penaliza fuertemente los giros sobre el eje
# ---------------------------------------------

# ----------------------------------------------
# Este paquete es el encargado de mantener una estimación precisa de la posición del robot utilizando un 
# filtro de Kalman extendido (EKF) que fusiona datos de múltiples sensores, como el UWB para la posición y el MPU6050 para la orientación.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: '[[0.10, 0.10], [0.10, -0.10], [-0.10, -0.10], [-0.10, 0.10]]'
      plugins: ["static_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.70
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: False
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
# ----------------------------------------------

# ----------------------------------------------
# Es el plugin encargado de cargar, estructurar y servir la representación bidimensional del entorno almacenada en disco.
map_server:
  ros__parameters:
    yaml_filename: "/home/eze/tesis_ws/src/tesis_robot_control/config/mapa.yaml"
# ----------------------------------------------

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# ----------------------------------------------
# Este paquete es el encargado de planificar rutas desde la posición actual del robot hasta un objetivo, 
# utilizando un mapa del entorno.
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0 
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      #plugin: "nav2_smac_planner::SmacPlanner2D" # Cambiamos el plugin
      minimum_turning_radius: 0.0  # 0.0 para robots omnidireccionales/mecanums
      max_iterations: 1000000
      diagonal_scanning: false 
      cost_travel_multiplier: 2.0
      tolerance: 0.3
      use_astar: true
      allow_unknown: true
# ----------------------------------------------

# ----------------------------------------------
# Se encarga de ejecutar maniobras de recuperación física cuando el robot se encuentra en una situación de bloqueo. 
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: map
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
# ----------------------------------------------

# ----------------------------------------------
# Este paquete se encarga de suavizar los comandos de velocidad generados por el controller_server
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.5, 2.0]
    min_velocity: [-0.5, -0.5, -2.0]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
# ----------------------------------------------

collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: False
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.15
      max_height: 2.0
      enabled: False

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: False
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

# ----------------------------------------------
# Este paquete es el encargado de gestionar el ciclo de vida de los nodos relacionados con la navegación, 
# asegurando que se inicien, detengan y reinicien de manera ordenada según sea necesario.
lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: 
      - map_server
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - velocity_smoother
# ----------------------------------------------